<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>春秋游-线路附件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-top: 76px; /* 给顶部导航留空间 */
        }
        
        /* 顶部导航栏 - 固定在左上角 */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            padding: 0 16px;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .back-btn {
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.18);
            padding: 6px 14px;
            border-radius: 20px;
            flex-shrink: 0;
            transition: background 0.2s;
            z-index: 1;
        }

        .back-btn:active {
            background: rgba(255,255,255,0.35);
        }

        .page-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .content {
            padding: 25px 20px;
        }
        
        .intro {
            background: #fff7e6;
            border-left: 4px solid #faad14;
            padding: 12px 15px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 20px;
            font-size: 14px;
            color: #666;
        }
        
        .attachment-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .attachment-item {
            background: #f8f9ff;
            border: 1px solid #e8e8ff;
            border-radius: 12px;
            padding: 14px 16px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: center;
            min-height: 72px;
            transition: all 0.3s;
        }
        
        .attachment-item:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }
        
        .attachment-info {
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }
        
        .attachment-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            flex-shrink: 0;
        }
        
        .attachment-text {
            overflow: hidden;
        }
        
        .attachment-name {
            font-size: 15px;
            color: #333;
            font-weight: 500;
            white-space: nowrap;
        }
        
        .attachment-name:hover {
            color: #667eea;
        }
        
        .attachment-desc {
            font-size: 12px;
            color: #999;
            margin-top: 3px;
            white-space: nowrap;
        }
        
        .view-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.3s;
            text-decoration: none;
            flex-shrink: 0;
        }
        
        .view-btn:hover {
            opacity: 0.9;
            transform: scale(1.05);
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 12px;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <a href="javascript:history.back()" class="back-btn">← 返回</a>
        <div class="page-title">📎 春秋游-线路附件</div>
    </div>

    <div class="container">
        <div class="header">
            <p>点击线路名称查看图片，预览页可下载PDF</p>
        </div>
        
        <div class="content">
            <div class="intro">
                💡 点击线路名称查看图片，预览页可下载PDF。
            </div>
            
            <div class="attachment-list">
                <!-- 线路1 -->
                <div class="attachment-item">
                    <div class="attachment-info">
                        <div class="attachment-icon">🚌</div>
                        <div class="attachment-text">
                            <span class="attachment-name">
                                1. 江西庐山 3天2晚
                            </span>
                            <div class="attachment-desc">庐山风景区详细行程</div>
                        </div>
                    </div>
                    <a href="view.html?route=1.江西庐山" class="view-btn">
                        👁️ 查看
                    </a>
                </div>
                
                <!-- 线路2 -->
                <div class="attachment-item">
                    <div class="attachment-info">
                        <div class="attachment-icon">🏖️</div>
                        <div class="attachment-text">
                            <span class="attachment-name">
                                2. 福建厦门 3天2晚
                            </span>
                            <div class="attachment-desc">鼓浪屿详细行程</div>
                        </div>
                    </div>
                    <a href="view.html?route=2.福建厦门" class="view-btn">
                        👁️ 查看
                    </a>
                </div>
                
                <!-- 线路3 -->
                <div class="attachment-item">
                    <div class="attachment-info">
                        <div class="attachment-icon">🌆</div>
                        <div class="attachment-text">
                            <span class="attachment-name">
                                3. 上海 2天1晚
                            </span>
                            <div class="attachment-desc">上海都市游详细行程</div>
                        </div>
                    </div>
                    <a href="view.html?route=3.上海" class="view-btn">
                        👁️ 查看
                    </a>
                </div>
                
                <!-- 线路4 -->
                <div class="attachment-item">
                    <div class="attachment-info">
                        <div class="attachment-icon">🏞️</div>
                        <div class="attachment-text">
                            <span class="attachment-name">
                                4. 泰顺苍南 3天2晚
                            </span>
                            <div class="attachment-desc">温泉古镇详细行程</div>
                        </div>
                    </div>
                    <a href="view.html?route=4.泰顺苍南" class="view-btn">
                        👁️ 查看
                    </a>
                </div>
                
                <!-- 线路5 -->
                <div class="attachment-item">
                    <div class="attachment-info">
                        <div class="attachment-icon">🌲</div>
                        <div class="attachment-text">
                            <span class="attachment-name">
                                5. 宁海 3天2晚
                            </span>
                            <div class="attachment-desc">森林温泉详细行程</div>
                        </div>
                    </div>
                    <a href="view.html?route=5.宁海" class="view-btn">
                        👁️ 查看
                    </a>
                </div>
                
                <!-- 线路6 -->
                <div class="attachment-item">
                    <div class="attachment-info">
                        <div class="attachment-icon">⛰️</div>
                        <div class="attachment-text">
                            <span class="attachment-name">
                                6. 台州椒江 3天2晚
                            </span>
                            <div class="attachment-desc">海岛风情详细行程</div>
                        </div>
                    </div>
                    <a href="view.html?route=6.台州椒江" class="view-btn">
                        👁️ 查看
                    </a>
                </div>
            </div>
        </div>
        
        <div class="footer">
            如有疑问请联系工会管理员
        </div>
    </div>

    <script>
        // 查看按钮防连点
        document.querySelectorAll('.view-btn').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                if (btn.disabled) {
                    e.preventDefault();
                    return;
                }
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.pointerEvents = 'none';
                setTimeout(function() {
                    btn.disabled = false;
                    btn.style.opacity = '';
                    btn.style.pointerEvents = '';
                }, 2000);
            });
        });
    </script>
</body>
</html>
