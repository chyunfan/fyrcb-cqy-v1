<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管理</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #f5f6f8; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h2 { color: #1a1a1a; margin-bottom: 20px; font-size: 20px; }

    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-outline { background: #fff; color: #1890ff; border: 1px solid #1890ff; }
    .btn-outline:hover { background: #e6f7ff; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-danger:hover { background: #ff7875; }
    .count { color: #999; font-size: 13px; margin-left: auto; }

    /* 统计卡片 */
    .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: #fff; border-radius: 8px; padding: 16px 24px; min-width: 120px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-num { font-size: 28px; font-weight: 700; color: #1890ff; }
    .stat-label { font-size: 13px; color: #999; margin-top: 4px; }

    /* 表格 */
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); font-size: 13px; }
    th { background: #fafafa; padding: 10px 12px; text-align: left; color: #666; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    td { padding: 10px 12px; color: #333; border-bottom: 1px solid #f5f5f5; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #fafafa; }
    .empty { text-align: center; color: #999; padding: 40px; }

    /* 模态框 */
    .modal-mask { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 24px; }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { cursor: pointer; font-size: 22px; color: #999; }
    .modal-close:hover { color: #333; }
    .detail-item { margin-bottom: 12px; }
    .detail-q { font-size: 13px; color: #999; margin-bottom: 4px; }
    .detail-a { font-size: 14px; color: #333; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <h2>📊 数据管理后台</h2>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="loadRecords()">🔄 刷新</button>
    <button class="btn btn-outline" onclick="exportCSV()">📥 导出 CSV</button>
    <span class="count" id="count"></span>
  </div>

  <div class="stats" id="stats"></div>

  <table>
    <thead>
      <tr>
        <th style="width:50px;">#</th>
        <th>提交时间</th>
        <th>性别</th>
        <th>年龄段</th>
        <th>岗位类型</th>
        <th style="width:160px;">操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- 详情模态框 -->
<div class="modal-mask" id="modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">
      <span>提交详情</span>
      <span class="modal-close" onclick="closeModal()">×</span>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const QUESTION_MAP = {
    q1: '1、您的性别？',
    q2: '2、您的年龄段？',
    q3: '3、您目前从事的岗位类型？',
    q4: '4、您在本单位的工作年限？',
    q5: '5、您在当前岗位的工作年限？',
    q6: '6、专业经验与岗位匹配度？',
    q7: '7、是否清楚岗位职责？',
    q8: '8、遇到难题通常怎么做？',
    q9: '9、岗位工作安排存在问题？（多选）',
    q10: '10、工作积极性如何？',
    q11: '11、员工懈怠的主要原因？（多选）',
    q12: '12、工作压力来源？（多选）',
    q13: '13、面对成长机会的态度？',
    q14: '14、对薪资福利是否满意？',
    q15: '15、绩效考核机制是否合理？',
    q16: '16、调动积极性最有效方式？',
    q17: '17、考核激励机制存在问题？（多选）',
    q18: '18、未来发展是否有规划？',
    q19: '19、单位最需要优化内容？（多选）',
    q20: '20、建议或意见（简答）',
  };

  async function loadRecords() {
    const res = await fetch('/api/records');
    const data = await res.json();
    const records = data.records || [];

    document.getElementById('count').textContent = `共 ${records.length} 条`;

    // 统计
    const genderMap = {}, ageMap = {}, postMap = {};
    records.forEach(r => {
      const a = r.answers || {};
      if (a.q1) genderMap[a.q1] = (genderMap[a.q1] || 0) + 1;
      if (a.q2) ageMap[a.q2] = (ageMap[a.q2] || 0) + 1;
      if (a.q3) postMap[a.q3] = (postMap[a.q3] || 0) + 1;
    });

    document.getElementById('stats').innerHTML = `
      <div class="stat-card"><div class="stat-num">${records.length}</div><div class="stat-label">总提交数</div></div>
      <div class="stat-card"><div class="stat-num">${Object.keys(genderMap).length}</div><div class="stat-label">性别分布</div></div>
      <div class="stat-card"><div class="stat-num">${Object.keys(ageMap).length}</div><div class="stat-label">年龄段分布</div></div>
      <div class="stat-card"><div class="stat-num">${Object.keys(postMap).length}</div><div class="stat-label">岗位类型</div></div>
    `;

    // 表格
    const tbody = document.getElementById('tbody');
    if (records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">暂无数据</td></tr>';
      return;
    }
    tbody.innerHTML = records.map((r, i) => {
      const a = r.answers || {};
      return `
        <tr>
          <td>${i + 1}</td>
          <td>${r.submitted_at ? new Date(r.submitted_at).toLocaleString('zh-CN') : '-'}</td>
          <td>${a.q1 || '-'}</td>
          <td>${a.q2 || '-'}</td>
          <td>${a.q3 || '-'}</td>
          <td>
            <span style="color:#1890ff;cursor:pointer;margin-right:12px;" onclick="showDetail('${r.id}')">查看</span>
            <span style="color:#ff4d4f;cursor:pointer;" onclick="delRecord('${r.id}')">删除</span>
          </td>
        </tr>
      `;
    }).join('');

    // 存储完整数据供模态框使用
    window.__records = records;
  }

  function showDetail(id) {
    const records = window.__records || [];
    const r = records.find(x => x.id === id);
    if (!r) return;
    const a = r.answers || {};
    let html = '';
    Object.keys(QUESTION_MAP).forEach(q => {
      if (a[q]) {
        html += `<div class="detail-item"><div class="detail-q">${QUESTION_MAP[q]}</div><div class="detail-a">${a[q]}</div></div>`;
      }
    });
    if (!html) html = '<div style="color:#999;">暂无答案数据</div>';
    document.getElementById('modal-body').innerHTML = html;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  async function delRecord(id) {
    if (!confirm('确定删除该记录？')) return;
    await fetch(`/api/records?id=${id}`, { method: 'DELETE' });
    loadRecords();
  }

  function exportCSV() {
    window.open('/api/export', '_blank');
  }

  loadRecords();
</script>
</body>
</html>
