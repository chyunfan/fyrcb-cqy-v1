<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>春秋游报名助手</title>
    <link rel="stylesheet" href="chat.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 顶部栏 -->
    <div class="chat-header">
        <div class="icon"><i class="fa-solid fa-robot"></i></div>
        <div>
            <div class="title">春秋游报名助手</div>
            <div class="subtitle" id="headerStatus">正在启动...</div>
        </div>
    </div>

    <!-- 消息容器 -->
    <div class="chat-messages" id="chatMessages"></div>

    <!-- 输入区 -->
    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="请输入..." autocomplete="off">
        <button class="send-btn" id="sendBtn" onclick="onSend()">
            <i class="fa-solid fa-paper-plane"></i>
        </button>
    </div>

    <!-- Toast -->
    <div class="chat-toast" id="chatToast"></div>

    <script src="chat.js"></script>
</body>
</html>
