<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>员工旅行报名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .header .attachment-link {
            display: inline-block;
            margin-top: 12px;
            background: rgba(255,255,255,0.25);
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .header .attachment-link:active {
            background: rgba(255,255,255,0.4);
        }
        
        .form-body {
            padding: 25px 20px;
        }
        
        .teller-input-section {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .teller-input-section h3 {
            font-size: 15px;
            color: #333;
            margin-bottom: 12px;
        }
        
        .teller-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .teller-input {
            flex: 1;
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            letter-spacing: 1px;
            transition: border-color 0.3s;
        }
        
        .teller-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .teller-input.error {
            border-color: #ff4d4f;
        }
        
        .teller-btn {
            padding: 10px 20px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
            white-space: nowrap;
        }
        
        .teller-btn:hover {
            background: #5568d3;
        }
        
        .teller-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .teller-hint {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
        
        .teller-error {
            font-size: 12px;
            color: #ff4d4f;
            margin-top: 8px;
        }
        
        .teller-success {
            font-size: 12px;
            color: #52c41a;
            margin-top: 8px;
        }
        
        .info-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            display: none;
        }
        
        .info-card.show {
            display: block;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #e0e0e0;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }

        .form-label .label-text {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .form-label .attachment-inline-link {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 3px;
            padding: 4px 12px;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff7eb3 0%, #ff758c 100%);
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(255,118,140,0.4);
            letter-spacing: 0.5px;
        }

        .form-label .attachment-inline-link:active {
            transform: scale(0.95);
            box-shadow: 0 1px 4px rgba(255,118,140,0.3);
        }
        
        .form-label .required {
            color: #ff4d4f;
        }
        
        .notice-box {
            background: #fff7e6;
            border: 1px solid #ffd591;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .notice-title {
            color: #fa8c16;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .notice-content {
            color: #666;
            font-size: 12px;
            line-height: 1.8;
        }
        
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .radio-item {
            flex: 1;
            min-width: calc(50% - 5px);
        }
        
        .radio-item label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 8px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            text-align: center;
        }
        
        .radio-item input {
            display: none;
        }
        
        .radio-item input:checked + label {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        
        .radio-item label:hover {
            border-color: #667eea;
        }
        
        .select-item {
            flex: 1;
            min-width: calc(33.33% - 7px);
        }
        
        .textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.3s;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            background: #52c41a;
        }
        
        .toast.error {
            background: #ff4d4f;
        }
        
        .hidden {
            display: none;
        }
        
        /* Loading 遮罩 */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.92);
            z-index: 9998;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .loading-overlay.show {
            display: flex;
        }
        
        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid #e8e8ff;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }
        
        .loading-text {
            margin-top: 16px;
            font-size: 14px;
            color: #667eea;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚌 春秋游-预报名</h1>
            <p>请先输入柜员号，再选择出行计划</p>
        </div>
        
        <!-- 柜员号输入区域 -->
        <div class="form-body">
            <div class="teller-input-section">
                <h3>请输入您的柜员号</h3>
                <div class="teller-input-row">
                    <input type="text" class="teller-input" id="tellerInput" maxlength="7" inputmode="numeric">
                    <button class="teller-btn" id="tellerBtn">确认</button>
                </div>
                <div class="teller-error" id="tellerError"></div>
                <div class="teller-success" id="tellerSuccess"></div>
            </div>
            
            <!-- 用户信息卡片（查询成功后显示） -->
            <div class="info-card" id="infoCard">
                <div class="info-row">
                    <span class="info-label">柜员号</span>
                    <span class="info-value" id="displayTellerNumber">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">姓名</span>
                    <span class="info-value" id="displayUserName">-</span>
                </div>
            </div>
            
            <!-- 表单区域（验证成功后显示） -->
            <div id="formSection" class="hidden">
                <form id="travelForm">
                    <div class="form-group">
                        <label class="form-label">
                            <span class="label-text">旅行线路 <span class="required">*</span></span>
                            <a href="attachments.html" class="attachment-inline-link">📎 查看附件</a>
                        </label>
                        <div class="radio-group" id="routeGroup">
                            <div class="radio-item">
                                <input type="radio" name="route" id="route1" value="1.江西庐山 3天2晚">
                                <label for="route1">江西庐山<br><small>3天2晚</small></label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="route" id="route2" value="2.福建厦门3天2晚。">
                                <label for="route2">福建厦门<br><small>3天2晚</small></label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="route" id="route3" value="3.上海2天1晚。">
                                <label for="route3">上海<br><small>2天1晚</small></label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="route" id="route4" value="4.泰顺苍南3天2晚。">
                                <label for="route4">泰顺苍南<br><small>3天2晚</small></label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="route" id="route5" value="5.宁海3天2晚。">
                                <label for="route5">宁海<br><small>3天2晚</small></label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="route" id="route6" value="6.台州椒江3天2晚。">
                                <label for="route6">台州椒江<br><small>3天2晚</small></label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">预计月份 <span class="required">*</span></label>
                        <div class="radio-group" id="monthGroup">
                            <div class="radio-item select-item">
                                <input type="radio" name="month" id="month6" value="6月">
                                <label for="month6">6月</label>
                            </div>
                            <div class="radio-item select-item">
                                <input type="radio" name="month" id="month7" value="7月">
                                <label for="month7">7月</label>
                            </div>
                            <div class="radio-item select-item">
                                <input type="radio" name="month" id="month8" value="8月">
                                <label for="month8">8月</label>
                            </div>
                            <div class="radio-item select-item">
                                <input type="radio" name="month" id="month9" value="9月">
                                <label for="month9">9月</label>
                            </div>
                            <div class="radio-item select-item">
                                <input type="radio" name="month" id="month10" value="10月">
                                <label for="month10">10月</label>
                            </div>
                            <div class="radio-item select-item">
                                <input type="radio" name="month" id="month11" value="11月">
                                <label for="month11">11月</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">家属随行人数（不含本人）<span class="required">*</span></label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" name="family" id="family0" value="0" checked>
                                <label for="family0">0人</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="family" id="family1" value="1">
                                <label for="family1">1人</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" name="family" id="family2" value="2">
                                <label for="family2">2人</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="notice-box">
                        <div class="notice-title">⚠️ 重要须知</div>
                        <div class="notice-content">
                            • 每月提前两周安排一个出行时段<br>
                            • 每人限出行一次<br>
                            • 若个人出行时间、线路有调整，请提前15天重新填写，逾期不予调整
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">其他备注</label>
                        <textarea class="textarea" id="remark" placeholder="如有其他要求请在此说明..."></textarea>
                    </div>
                    
                    <button type="submit" class="submit-btn" id="submitBtn">
                        提交报名
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadingText">加载中...</div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        let currentUser = { tellerNumber: '', userName: '', ygxs: '', recordId: null, allowEdit: true };

        function showLoading(show, text) {
            var overlay = document.getElementById('loadingOverlay');
            var textEl = document.getElementById('loadingText');
            if (text) textEl.textContent = text;
            overlay.classList.toggle('show', show);
        }

        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + (type || 'info') + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }

        function validateTellerNumber(num) {
            var n = parseInt(num, 10);
            return !isNaN(n) && n > 8050002 && n < 8054000;
        }

        // 保存状态到 sessionStorage
        function saveTellerState() {
            sessionStorage.setItem('cqy_teller', JSON.stringify({
                tellerNumber: currentUser.tellerNumber,
                userName: currentUser.userName,
                ygxs: currentUser.ygxs
            }));
        }

        // 从 sessionStorage 恢复状态
        function restoreTellerState() {
            var saved = sessionStorage.getItem('cqy_teller');
            if (!saved) return false;

            try {
                var info = JSON.parse(saved);
                currentUser.tellerNumber = info.tellerNumber;
                currentUser.userName = info.userName;
                currentUser.ygxs = info.ygxs || '';

                document.getElementById('displayTellerNumber').textContent = info.tellerNumber;
                document.getElementById('displayUserName').textContent = info.userName;
                document.getElementById('infoCard').classList.add('show');
                document.getElementById('formSection').classList.remove('hidden');
                document.getElementById('tellerInput').value = info.tellerNumber;

                // 重新查询报名记录
                queryExisting();
                return true;
            } catch(e) {
                sessionStorage.removeItem('cqy_teller');
                return false;
            }
        }

        // 查询柜员号
        document.getElementById('tellerBtn').addEventListener('click', function() {
            var input = document.getElementById('tellerInput');
            var num = input.value.trim();
            var errorEl = document.getElementById('tellerError');
            var successEl = document.getElementById('tellerSuccess');

            errorEl.textContent = '';
            successEl.textContent = '';
            input.classList.remove('error');

            if (!num) {
                errorEl.textContent = '请输入柜员号';
                input.classList.add('error');
                return;
            }

            if (!validateTellerNumber(num)) {
                errorEl.textContent = '柜员号格式不正确，范围：8050003 ~ 8053999';
                input.classList.add('error');
                return;
            }

            // 显示 loading
            showLoading(true, '正在查询柜员信息...');
            document.getElementById('tellerBtn').disabled = true;

            fetch('/api/lookup-teller?tellerNumber=' + encodeURIComponent(num))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    showLoading(false);
                    document.getElementById('tellerBtn').disabled = false;

                    if (data.error) {
                        errorEl.textContent = data.error;
                        input.classList.add('error');
                        return;
                    }

                    // 保存用户信息
                    currentUser.tellerNumber = data.tellerNumber;
                    currentUser.userName = data.userName;
                    currentUser.ygxs = data.ygxs || '';

                    // 显示用户信息
                    document.getElementById('displayTellerNumber').textContent = data.tellerNumber;
                    document.getElementById('displayUserName').textContent = data.userName;
                    document.getElementById('infoCard').classList.add('show');
                    successEl.textContent = '验证成功，欢迎 ' + data.userName + '！';

                    // 保存状态到 sessionStorage
                    saveTellerState();

                    // 显示表单区域
                    document.getElementById('formSection').classList.remove('hidden');

                    // 优先使用已返回的报名记录直接回显（避免重复请求）
                    if (data.existingRecord) {
                        currentUser.recordId = data.existingRecord.id;
                        if (!data.existingRecord.allowEdit) {
                            currentUser.allowEdit = false;
                            showToast('您已报名，且不允许修改', 'error');
                            setTimeout(function() { disableForm(); }, 500);
                        } else {
                            fillForm(data.existingRecord.fields);
                            showToast('已加载您的报名信息，可修改后重新提交', 'success');
                        }
                    } else {
                        // 兜底：API 未返回记录时再查询一次
                        queryExisting();
                    }
                })
                .catch(function(err) {
                    showLoading(false);
                    document.getElementById('tellerBtn').disabled = false;
                    errorEl.textContent = '查询失败：' + err.message;
                });
        });

        // 回车触发查询
        document.getElementById('tellerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('tellerBtn').click();
            }
        });

        // 查询是否已有报名记录
        function queryExisting() {
            fetch('/api/query?tellerNumber=' + encodeURIComponent(currentUser.tellerNumber))
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.error) {
                        console.error('查询记录失败:', data.error);
                        showToast('查询记录失败：' + data.error, 'error');
                        return;
                    }
                    if (data.records && data.records.length > 0) {
                        var record = data.records[0];
                        currentUser.recordId = record.id;
                        // 检查是否允许修改
                        if (record.fields['是否允许修改'] === '否') {
                            currentUser.allowEdit = false;
                            showToast('您已报名，且不允许修改', 'error');
                            setTimeout(function() {
                                disableForm();
                            }, 500);
                        } else {
                            // 回显已填数据
                            fillForm(record.fields);
                            showToast('已加载您的报名信息，可修改后重新提交', 'success');
                        }
                    }
                })
                .catch(function(err) {
                    console.error('查询记录失败:', err);
                    showToast('查询记录失败，请检查网络或联系管理员', 'error');
                });
        }

        function fillForm(fields) {
            // 旅行线路：用关键词匹配（Airtable存的值可能和HTML value格式不同）
            if (fields['旅行线路']) {
                var routeText = (fields['旅行线路'] || '').toString();
                var routeInputs = document.querySelectorAll('input[name="route"]');
                // 关键词映射：Airtable中的值包含这些关键词时，匹配对应radio
                var routeKeywords = ['庐山', '厦门', '上海', '泰顺', '宁海', '台州'];
                var matched = false;
                for (var i = 0; i < routeKeywords.length; i++) {
                    if (routeText.indexOf(routeKeywords[i]) !== -1) {
                        routeInputs[i].checked = true;
                        matched = true;
                        break;
                    }
                }
                if (!matched) {
                    // 兜底：模糊匹配
                    for (var i = 0; i < routeInputs.length; i++) {
                        var val = routeInputs[i].value.replace(/\s+/g, '').replace(/[。.]/g, '').toLowerCase();
                        var txt = routeText.replace(/\s+/g, '').replace(/[。.]/g, '').toLowerCase();
                        if (val.indexOf(txt) !== -1 || txt.indexOf(val) !== -1) {
                            routeInputs[i].checked = true;
                            break;
                        }
                    }
                }
            }

            // 月份：精确匹配
            if (fields['月份']) {
                var monthText = (fields['月份'] || '').toString().replace(/[月]/g, '');
                var monthInputs = document.querySelectorAll('input[name="month"]');
                for (var i = 0; i < monthInputs.length; i++) {
                    if (monthInputs[i].value.replace(/[月]/g, '') === monthText) {
                        monthInputs[i].checked = true;
                        break;
                    }
                }
            }

            // 家属人数
            if (fields['家庭成员人数'] !== undefined) {
                var val = String(fields['家庭成员人数']);
                var familyInputs = document.querySelectorAll('input[name="family"]');
                for (var i = 0; i < familyInputs.length; i++) {
                    if (familyInputs[i].value === val) {
                        familyInputs[i].checked = true;
                        break;
                    }
                }
            }

            // 备注
            if (fields['备注']) {
                document.getElementById('remark').value = fields['备注'];
            }
        }

        function disableForm() {
            var elements = document.querySelectorAll('#travelForm input, #travelForm textarea, #travelForm button');
            for (var i = 0; i < elements.length; i++) {
                elements[i].disabled = true;
            }
        }

        // 提交表单
        document.getElementById('travelForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!currentUser.allowEdit) {
                showToast('当前不允许修改报名信息', 'error');
                return;
            }

            var route = document.querySelector('input[name="route"]:checked');
            var month = document.querySelector('input[name="month"]:checked');
            var family = document.querySelector('input[name="family"]:checked');
            var remark = document.getElementById('remark').value.trim();

            if (!route) { showToast('请选择旅行线路', 'error'); return; }
            if (!month) { showToast('请选择月份', 'error'); return; }
            if (!family) { showToast('请选择家属随行人数', 'error'); return; }

            var submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            var payload = {
                tellerNumber: currentUser.tellerNumber,
                userName: currentUser.userName,
                ygxs: currentUser.ygxs,
                route: route.value,
                month: month.value,
                family: parseInt(family.value),
                remark: remark,
                recordId: currentUser.recordId
            };

            fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交报名';

                if (data.error) {
                    showToast('提交失败：' + data.error, 'error');
                    return;
                }

                if (currentUser.recordId) {
                    showToast('修改成功！', 'success');
                } else {
                    showToast('提交成功！', 'success');
                    currentUser.recordId = 'submitted';
                }

                setTimeout(function() { disableForm(); }, 500);
            })
            .catch(function(err) {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交报名';
                showToast('提交失败：' + err.message, 'error');
            });
        });
        // 页面加载时恢复状态
        restoreTellerState();

        // 处理 bfcache（浏览器后退时从缓存恢复）
        window.addEventListener('pageshow', function(e) {
            if (e.persisted) restoreTellerState();
        });
    </script>
</body>
</html>
