<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据管理</title>
  <style>
    * { box-sizing: border-box; margin:0; padding:0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; background: #f5f6f8; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    h2 { color: #1a1a1a; margin-bottom: 20px; font-size: 20px; }

    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.2s; }
    .btn-primary { background: #1890ff; color: #fff; }
    .btn-primary:hover { background: #40a9ff; }
    .btn-outline { background: #fff; color: #1890ff; border: 1px solid #1890ff; }
    .btn-outline:hover { background: #e6f7ff; }
    .btn-danger { background: #ff4d4f; color: #fff; }
    .btn-danger:hover { background: #ff7875; }
    .count { color: #999; font-size: 13px; margin-left: auto; }

    /* 统计卡片 */
    .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: #fff; border-radius: 8px; padding: 16px 24px; min-width: 120px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .stat-num { font-size: 28px; font-weight: 700; color: #1890ff; }
    .stat-label { font-size: 13px; color: #999; margin-top: 4px; }

    /* 表格 */
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); font-size: 13px; }
    th { background: #fafafa; padding: 10px 12px; text-align: left; color: #666; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
    td { padding: 10px 12px; color: #333; border-bottom: 1px solid #f5f5f5; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    tr:hover td { background: #fafafa; }
    .empty { text-align: center; color: #999; padding: 40px; }

    /* 模态框 */
    .modal-mask { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.45); z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 12px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; padding: 24px; }
    .modal-title { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
    .modal-close { cursor: pointer; font-size: 22px; color: #999; }
    .modal-close:hover { color: #333; }
    .detail-item { margin-bottom: 12px; }
    .detail-q { font-size: 13px; color: #999; margin-bottom: 4px; }
    .detail-a { font-size: 14px; color: #333; line-height: 1.6; }
  </style>
</head>
<body>

<div class="container">
  <h2>📊 数据管理后台</h2>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="surveyLoadRecords()">🔄 刷新</button>
    <button class="btn btn-outline" onclick="surveyExportCSV()">📥 导出 CSV</button>
    <span class="count" id="count"></span>
  </div>

  <div class="stats" id="stats"></div>

  <table>
    <thead>
      <tr>
        <th style="width:50px;">#</th>
        <th>提交时间</th>
        <th>性别</th>
        <th>年龄段</th>
        <th>岗位类型</th>
        <th style="width:160px;">操作</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- 详情模态框 -->
<div class="modal-mask" id="modal" style="display:none;">
  <div class="modal-box">
    <div class="modal-title">
      <span>提交详情</span>
      <span class="modal-close" onclick="surveyCloseModal()">×</span>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script src="survey.js"></script>
</body>
</html>
