<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>员工旅行报名</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .header .attachment-link {
            display: inline-block;
            margin-top: 12px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .header .attachment-link:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .form-body {
            padding: 25px 20px;
        }
        
        .info-card {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f4ff 100%);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dashed #e0e0e0;
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
            font-size: 14px;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #333;
            margin-bottom: 8px;
        }
        
        .form-label .required {
            color: #ff4d4f;
        }
        
        .notice-box {
            background: #fff7e6;
            border: 1px solid #ffd591;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }
        
        .notice-title {
            color: #fa8c16;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .notice-content {
            color: #666;
            font-size: 12px;
            line-height: 1.8;
        }
        
        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .radio-item {
            flex: 1;
            min-width: calc(50% - 5px);
        }
        
        .radio-item label {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 8px;
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            text-align: center;
        }
        
        .radio-item input {
            display: none;
        }
        
        .radio-item input:checked + label {
            background: #667eea;
            border-color: #667eea;
            color: #fff;
        }
        
        .radio-item label:hover {
            border-color: #667eea;
        }
        
        .select-item {
            flex: 1;
            min-width: calc(33.33% - 7px);
        }
        
        .textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            min-height: 80px;
            font-family: inherit;
        }
        
        .textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0,0,0,0.8);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.3s;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        .toast.success {
            background: #52c41a;
        }
        
        .toast.error {
            background: #ff4d4f;
        }
        
        .hidden {
            display: none;
        }
        
        .user-info-loading {
            text-align: center;
            padding: 30px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚌 春秋游-预报名</h1>
            <p>请选择您的出行计划</p>
            <a href="attachments.html" class="attachment-link">📎 查看各线路附件</a>
        </div>
        
        <div id="loading" class="loading show">
            <div class="spinner"></div>
            <p id="loadingText">正在获取用户信息...</p>
        </div>
        
        <div id="formContainer" class="form-body hidden">
            <div class="info-card">
                <div class="info-row">
                    <span class="info-label">柜员号</span>
                    <span class="info-value" id="userId">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">姓名</span>
                    <span class="info-value" id="userName">-</span>
                </div>
            </div>
            
            <form id="travelForm">
                <div class="form-group">
                    <label class="form-label">旅行线路 <span class="required">*</span></label>
                    <div class="radio-group" id="routeGroup">
                        <div class="radio-item">
                            <input type="radio" name="route" id="route1" value="1.江西庐山3天2晚。">
                            <label for="route1">江西庐山<br><small>3天2晚</small></label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="route" id="route2" value="2.福建厦门3天2晚。">
                            <label for="route2">福建厦门<br><small>3天2晚</small></label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="route" id="route3" value="3.上海2天1晚。">
                            <label for="route3">上海<br><small>2天1晚</small></label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="route" id="route4" value="4.泰顺苍南3天2晚。">
                            <label for="route4">泰顺苍南<br><small>3天2晚</small></label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="route" id="route5" value="5.宁海3天2晚。">
                            <label for="route5">宁海<br><small>3天2晚</small></label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="route" id="route6" value="6.台州椒江3天2晚">
                            <label for="route6">台州椒江<br><small>3天2晚</small></label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">预计月份 <span class="required">*</span></label>
                    <div class="radio-group" id="monthGroup">
                        <div class="radio-item select-item">
                            <input type="radio" name="month" id="month6" value="6月">
                            <label for="month6">6月</label>
                        </div>
                        <div class="radio-item select-item">
                            <input type="radio" name="month" id="month7" value="7月">
                            <label for="month7">7月</label>
                        </div>
                        <div class="radio-item select-item">
                            <input type="radio" name="month" id="month8" value="8月">
                            <label for="month8">8月</label>
                        </div>
                        <div class="radio-item select-item">
                            <input type="radio" name="month" id="month9" value="9月">
                            <label for="month9">9月</label>
                        </div>
                        <div class="radio-item select-item">
                            <input type="radio" name="month" id="month10" value="10月">
                            <label for="month10">10月</label>
                        </div>
                        <div class="radio-item select-item">
                            <input type="radio" name="month" id="month11" value="11月">
                            <label for="month11">11月</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">家属随行人数（不含本人）<span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-item">
                            <input type="radio" name="family" id="family0" value="0" checked>
                            <label for="family0">0人</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="family" id="family1" value="1">
                            <label for="family1">1人</label>
                        </div>
                        <div class="radio-item">
                            <input type="radio" name="family" id="family2" value="2">
                            <label for="family2">2人</label>
                        </div>
                    </div>
                </div>
                
                <div class="notice-box">
                    <div class="notice-title">⚠️ 重要须知</div>
                    <div class="notice-content">
                        • 每月提前两周安排一个出行时段<br>
                        • 每人限出行一次<br>
                        • 若个人出行时间、线路有调整，请提前15天重新填写，逾期不予调整
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">其他备注</label>
                    <textarea class="textarea" id="remark" placeholder="如有其他要求请在此说明..."></textarea>
                </div>
                
                <button type="submit" class="submit-btn" id="submitBtn">
                    提交报名
                </button>
            </form>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        const CONFIG = {
            WECOM_CORPID: 'ww1f008e48017ee8e6',
            WECOM_AGENTID: '1000893',
            DEV_MODE: true,
            DEV_USER_ID: 'TEST001',       // 企业微信 UserId（用于查询/存储）
            DEV_USER_NAME: '测试员工',     // 姓名
            DEV_TELLER_NUMBER: '8059999'  // 柜员号（用于展示）
        };
        
        let currentUser = { userId: '', userName: '', tellerNumber: '' };
        let existingRecordId = null;
        
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }
        
        function showLoading(show, text) {
            text = text || '加载中...';
            document.getElementById('loading').classList.toggle('show', show);
            document.getElementById('loadingText').textContent = text;
            document.getElementById('formContainer').classList.toggle('hidden', show);
        }
        
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        function redirectToWecomAuth() {
            const redirectUri = encodeURIComponent(window.location.href.split('?')[0]);
            const state = Math.random().toString(36).substr(2, 15);
            sessionStorage.setItem('wecom_state', state);
            const authUrl = 'https://open.work.weixin.qq.com/wwopen/sso/qrConnect?appid=' + CONFIG.WECOM_CORPID + '&agentid=' + CONFIG.WECOM_AGENTID + '&redirect_uri=' + redirectUri + '&state=' + state;
            window.location.href = authUrl;
        }
        
        async function getUserInfoByCode(code) {
            const response = await fetch('/api/wecom-auth?code=' + code);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            return { 
                userId: data.userId,           // 企业微信 UserId（用于查询/存储）
                userName: data.userName,       // 姓名
                tellerNumber: data.tellerNumber // 柜员号（用于展示）
            };
        }
        
        async function queryRecord(userId) {
            try {
                const response = await fetch('/api/query?userId=' + userId);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            } catch (error) {
                console.error('查询记录失败:', error);
                return null;
            }
        }
        
        async function submitRecord(userId, tellerNumber, userName, route, month, family, remark, recordId) {
            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, tellerNumber, userName, route, month, family, remark, recordId })
                });
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                return data;
            } catch (error) {
                console.error('提交记录失败:', error);
                throw error;
            }
        }
        
        async function createRecord(fields) {
            return await submitRecord(fields['用户ID'], fields['柜员号'], fields['姓名'], fields['旅行线路'], fields['月份'], fields['家庭成员人数'], fields['备注'], null);
        }
        
        async function updateRecord(recordId, fields) {
            return await submitRecord(fields['用户ID'], fields['柜员号'], fields['姓名'], fields['旅行线路'], fields['月份'], fields['家庭成员人数'], fields['备注'], recordId);
        }
        
        function fillForm(record) {
            const fields = record.fields;
            if (fields['旅行线路']) {
                var routeInput = document.querySelector('input[name="route"][value="' + fields['旅行线路'] + '"]');
                if (routeInput) routeInput.checked = true;
            }
            if (fields['月份']) {
                var monthInput = document.querySelector('input[name="month"][value="' + fields['月份'] + '"]');
                if (monthInput) monthInput.checked = true;
            }
            if (fields['家庭成员人数'] !== undefined) {
                var familyInput = document.querySelector('input[name="family"][value="' + fields['家庭成员人数'] + '"]');
                if (familyInput) familyInput.checked = true;
            }
            if (fields['备注']) {
                document.getElementById('remark').value = fields['备注'];
            }
        }
        
        function getFormData() {
            var route = document.querySelector('input[name="route"]:checked');
            var month = document.querySelector('input[name="month"]:checked');
            var family = document.querySelector('input[name="family"]:checked');
            var remark = document.getElementById('remark').value.trim();
            return {
                '用户ID': currentUser.userId,     // 企业微信 UserId（用于查询/存储）
                '柜员号': currentUser.tellerNumber || currentUser.userId, // 柜员号（用于展示）
                '姓名': currentUser.userName,
                '旅行线路': route ? route.value : '',
                '月份': month ? month.value : '',
                '家庭成员人数': family ? parseInt(family.value) : 0,
                '备注': remark
            };
        }
        
        function validateForm(data) {
            if (!data['旅行线路']) {
                showToast('请选择旅行线路', 'error');
                return false;
            }
            if (!data['月份']) {
                showToast('请选择月份', 'error');
                return false;
            }
            if (!document.querySelector('input[name="family"]:checked')) {
                showToast('请选择家属随行人数', 'error');
                return false;
            }
            return true;
        }
        
        async function handleSubmit(e) {
            e.preventDefault();
            var formData = getFormData();
            if (!validateForm(formData)) return;
            
            var submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';
            
            try {
                if (existingRecordId) {
                    await updateRecord(existingRecordId, {
                        '用户ID': formData['用户ID'],
                        '柜员号': formData['柜员号'],
                        '姓名': formData['姓名'],
                        '旅行线路': formData['旅行线路'],
                        '月份': formData['月份'],
                        '家庭成员人数': formData['家庭成员人数'],
                        '备注': formData['备注']
                    });
                    showToast('修改成功！', 'success');
                } else {
                    await createRecord({
                        '用户ID': formData['用户ID'],
                        '柜员号': formData['柜员号'],
                        '姓名': formData['姓名'],
                        '旅行线路': formData['旅行线路'],
                        '月份': formData['月份'],
                        '家庭成员人数': formData['家庭成员人数'],
                        '备注': formData['备注']
                    });
                    showToast('提交成功！', 'success');
                    existingRecordId = 'submitted';
                }
                
                setTimeout(function() {
                    var elements = document.querySelectorAll('input, textarea, button');
                    for (var i = 0; i < elements.length; i++) {
                        elements[i].disabled = true;
                    }
                }, 500);
            } catch (error) {
                showToast('提交失败: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '提交报名';
            }
        }
        
        async function init() {
            if (CONFIG.DEV_MODE) {
                currentUser.userId = CONFIG.DEV_USER_ID;
                currentUser.userName = CONFIG.DEV_USER_NAME;
                currentUser.tellerNumber = CONFIG.DEV_TELLER_NUMBER;
                document.getElementById('userId').textContent = currentUser.tellerNumber;
                document.getElementById('userName').textContent = currentUser.userName;
                
                var existingRecord = await queryRecord(currentUser.userId);
                if (existingRecord) {
                    existingRecordId = existingRecord.id;
                    fillForm(existingRecord);
                    showToast('已加载您的报名信息（开发模式）', 'success');
                } else {
                    showToast('开发模式：已使用测试账号', 'success');
                }
                showLoading(false);
                return;
            }
            
            var code = getUrlParam('code');
            var state = getUrlParam('state');
            var savedState = sessionStorage.getItem('wecom_state');
            
            if (state && state !== savedState) {
                showLoading(false);
                showToast('验证失败，请重试', 'error');
                return;
            }
            
            if (!code) {
                showLoading(false);
                document.getElementById('loadingText').textContent = '即将跳转到企业微信授权...';
                setTimeout(function() { redirectToWecomAuth(); }, 1500);
                return;
            }
            
            try {
                var userDetail = await getUserInfoByCode(code);
                currentUser.userId = userDetail.userId;
                currentUser.userName = userDetail.userName;
                currentUser.tellerNumber = userDetail.tellerNumber || userDetail.userId;
                document.getElementById('userId').textContent = currentUser.tellerNumber;
                document.getElementById('userName').textContent = currentUser.userName;
                
                var existingRecord2 = await queryRecord(currentUser.userId);
                if (existingRecord2) {
                    existingRecordId = existingRecord2.id;
                    fillForm(existingRecord2);
                    showToast('已加载您的报名信息', 'success');
                }
                showLoading(false);
            } catch (error) {
                showLoading(false);
                showToast('获取用户信息失败: ' + error.message, 'error');
            }
        }
        
        document.getElementById('travelForm').addEventListener('submit', handleSubmit);
        init();
    </script>
</body>
</html>
