<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>春秋游报名管理</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; background:#f0f2f5; min-height:100vh; }
        .unauthorized { text-align:center; padding:80px 20px; color:#999; font-size:16px; }
        .container { max-width:900px; margin:0 auto; padding:20px; }
        .header { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; padding:20px; border-radius:16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
        .header h1 { font-size:20px; font-weight:600; }
        .header .token-status { font-size:13px; opacity:0.8; }
        .tabs { display:flex; background:#fff; border-radius:12px; overflow:hidden; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
        .tab { flex:1; padding:14px; text-align:center; font-size:14px; cursor:pointer; transition:all 0.2s; color:#666; border-bottom:3px solid transparent; }
        .tab.active { color:#667eea; font-weight:600; border-bottom-color:#667eea; background:rgba(102,126,234,0.05); }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        .card { background:#fff; border-radius:16px; padding:20px; margin-bottom:20px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
        .card-title { font-size:15px; font-weight:600; color:#333; margin-bottom:14px; }
        .filter-row { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
        .filter-row select, .filter-row input { padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:13px; }
        .filter-row input[type="text"] { width:120px; }
        .btn { padding:8px 16px; border:none; border-radius:8px; font-size:13px; cursor:pointer; transition:all 0.15s; }
        .btn-primary { background:#667eea; color:#fff; }
        .btn-primary:active { background:#5568d3; }
        .btn-danger { background:#ff4d4f; color:#fff; }
        .btn-danger:active { background:#d9363e; }
        .btn-success { background:#52c41a; color:#fff; }
        .btn-outline { background:transparent; border:1px solid #667eea; color:#667eea; }
        .btn-sm { padding:5px 10px; font-size:12px; }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th { background:#f8f9ff; padding:10px 8px; text-align:left; font-weight:600; color:#333; border-bottom:2px solid #e0e0e0; white-space:nowrap; }
        td { padding:10px 8px; border-bottom:1px solid #f0f0f0; color:#333; }
        tr:hover td { background:#f8f9ff; }
        .badge-yes { color:#52c41a; font-weight:600; }
        .badge-no { color:#ff4d4f; font-weight:600; }
        .checkbox { width:16px; height:16px; cursor:pointer; }
        .pagination { display:flex; justify-content:center; gap:8px; margin-top:14px; }
        .pagination button { padding:6px 12px; border:1px solid #ddd; background:#fff; border-radius:6px; cursor:pointer; font-size:13px; }
        .pagination button.active { background:#667eea; color:#fff; border-color:#667eea; }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:14px; margin-bottom:20px; }
        .stats-card {
            background:#fff; border-radius:14px; padding:18px 16px;
            box-shadow:0 2px 12px rgba(102,126,234,0.1);
            position:relative; overflow:hidden;
            transition:transform 0.2s, box-shadow 0.2s;
        }
        .stats-card:active { transform:scale(0.98); }
        .stats-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:4px;
            background:linear-gradient(90deg,#667eea,#764ba2);
        }
        .stats-card .icon { font-size:24px; margin-bottom:6px; }
        .stats-card .num { font-size:32px; font-weight:700; color:#667eea; line-height:1.2; }
        .stats-card .label { font-size:13px; color:#888; margin-top:4px; }
        .stats-card.allow .num { color:#52c41a; }
        .stats-card.allow::before { background:linear-gradient(90deg,#52c41a,#73d13d); }
        .stats-card.deny .num { color:#ff4d4f; }
        .stats-card.deny::before { background:linear-gradient(90deg,#ff4d4f,#ff7875); }
        .stats-card.route .num { color:#ff758c; }
        .stats-card.route::before { background:linear-gradient(90deg,#ff758c,#ff7eb3); }

        .cross-table { width:100%; border-collapse:separate; border-spacing:0; font-size:13px; margin-top:14px; border-radius:12px; overflow:hidden; }
        .cross-table th {
            background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;
            padding:12px 10px; font-weight:600; text-align:center;
            border-right:1px solid rgba(255,255,255,0.15);
        }
        .cross-table th:last-child { border-right:none; }
        .cross-table td {
            padding:14px 10px; text-align:center;
            border-bottom:1px solid #f0f0f0; border-right:1px solid #f0f0f0;
            color:#333; font-weight:500;
        }
        .cross-table td:last-child { border-right:none; }
        .cross-table tr:last-child td { border-bottom:none; }
        .cross-table tr:hover td { background:rgba(102,126,234,0.04); }
        .cross-table .row-header {
            background:#f8f9ff; font-weight:600; color:#333; text-align:left;
            padding-left:14px; max-width:140px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .cross-table .zero { color:#ccc; font-weight:400; }
        .cross-table .total-row { background:#333; color:#fff; }
        .cross-table .total-row td { color:#fff; border-right:1px solid rgba(255,255,255,0.1); border-bottom:none; font-weight:700; }
        .cross-table .total-row .row-header { background:#333; color:#fff; }
        .cross-table .total-col { background:rgba(102,126,234,0.06); font-weight:700; color:#667eea; }
        .cross-table .total-row .total-col { background:#333; color:#fff; }
        .batch-form { display:flex; flex-direction:column; gap:14px; }
        .batch-form label { font-size:14px; color:#333; font-weight:500; }
        .batch-form .radio-group { display:flex; gap:20px; margin:8px 0; }
        .batch-form .radio-group label { font-weight:400; display:flex; align-items:center; gap:6px; cursor:pointer; }
        .batch-form .condition-row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .batch-form .condition-row select, .batch-form .condition-row input { padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:13px; }
        .preview-box { background:#f8f9ff; border-radius:10px; padding:14px; margin-top:10px; font-size:13px; color:#333; }
        .preview-box .count { font-size:22px; font-weight:700; color:#667eea; }
        .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:12px 24px; border-radius:10px; font-size:14px; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
        .toast.show { opacity:1; }
        .toast.success { background:#52c41a; color:#fff; }
        .toast.error { background:#ff4d4f; color:#fff; }
        .toast.info { background:#667eea; color:#fff; }
        .empty { text-align:center; padding:40px; color:#999; font-size:14px; }
    </style>
</head>
<body>

<div id="app" style="display:none;">
    <div class="container">
        <div class="header">
            <h1>🔒 春秋游报名管理</h1>
            <span class="token-status">Token 验证：✅ 已通过</span>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('records')">📋 记录管理</div>
            <div class="tab" onclick="switchTab('batch')">⚙️ 批量设置</div>
            <div class="tab" onclick="switchTab('stats')">📊 统计看板</div>
        </div>

        <!-- Tab1：记录管理 -->
        <div id="tab-records" class="tab-content active">
            <div class="card">
                <div class="card-title">筛选条件</div>
                <div class="filter-row">
                    <select id="filterRoute"><option value="">全部线路</option><option>江西庐山 3天2晚</option><option>福建厦门3天2晚。</option><option>上海2天1晚。</option><option>泰顺苍南2天1晚</option><option>宁海1天</option><option>台州椒江1天</option></select>
                    <select id="filterMonth"><option value="">全部月份</option><option>6月</option><option>7月</option><option>8月</option></select>
                    <input type="text" id="filterTeller" placeholder="柜员号">
                    <button class="btn btn-primary" onclick="loadRecords(1)">搜索</button>
                    <a class="btn btn-outline" id="exportBtn" href="#" download>📥 导出CSV</a>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
                    <div class="card-title" style="margin:0;">报名记录</div>
                    <div>
                        <button class="btn btn-success btn-sm" onclick="batchUpdate('是')">批量允许修改</button>
                        <button class="btn btn-danger btn-sm" onclick="batchUpdate('否')">批量禁止修改</button>
                    </div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead><tr>
                            <th><input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll()"></th>
                            <th>柜员号</th><th>姓名</th><th>ygxs</th><th>线路</th><th>月份</th><th>家属</th><th>允许修改</th><th>操作</th>
                        </tr></thead>
                        <tbody id="recordsBody"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
                <div class="empty" id="emptyRecords" style="display:none;">暂无记录</div>
            </div>
        </div>

        <!-- Tab2：批量设置 -->
        <div id="tab-batch" class="tab-content">
            <div class="card">
                <div class="card-title">按条件一键设置"是否允许修改"</div>
                <div class="batch-form">
                    <div>
                        <label>设置值：</label>
                        <div class="radio-group">
                            <label><input type="radio" name="batchAllow" value="是"> 允许修改</label>
                            <label><input type="radio" name="batchAllow" value="否" checked> 禁止修改</label>
                        </div>
                    </div>
                    <div>
                        <label>适用条件（至少填一个）：</label>
                        <div class="condition-row">
                            <select id="batchRoute"><option value="">全部线路</option><option>江西庐山 3天2晚</option><option>福建厦门3天2晚。</option><option>上海2天1晚。</option><option>泰顺苍南2天1晚</option><option>宁海1天</option><option>台州椒江1天</option></select>
                            <select id="batchMonth"><option value="">全部月份</option><option>6月</option><option>7月</option><option>8月</option></select>
                        </div>
                        <div class="condition-row" style="margin-top:8px;">
                            <input type="text" id="batchTellerStart" placeholder="柜员号起始" style="width:120px;">
                            <span>~</span>
                            <input type="text" id="batchTellerEnd" placeholder="柜员号结束" style="width:120px;">
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-primary" onclick="previewBatch()">🔍 预览影响的记录</button>
                    </div>
                    <div class="preview-box" id="previewBox" style="display:none;"></div>
                    <div>
                        <button class="btn btn-danger" id="confirmBatchBtn" style="display:none;" onclick="confirmBatch()">⚠️ 确认一键设置</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab3：统计看板 -->
        <div id="tab-stats" class="tab-content">
            <div class="stats-grid" id="statsCards"></div>
            <div class="card">
                <div class="card-title">线路 × 月份 报名分布</div>
                <div class="table-wrap" id="crossTableWrap"></div>
            </div>
        </div>
    </div>
</div>

<div class="unauthorized" id="unauthorized">
    <h2>🔒 需要访问权限</h2>
    <p style="margin-top:12px;">请在 URL 中添加 <code>?token=你的密钥</code> 参数</p>
</div>

<div class="toast" id="toast"></div>

<script>
    var TOKEN = new URLSearchParams(location.search).get('token') || '';
    var API_BASE = '';

    // 页面初始化
    if (!TOKEN) {
        document.getElementById('app').style.display = 'none';
        document.getElementById('unauthorized').style.display = 'block';
    } else {
        document.getElementById('app').style.display = 'block';
        document.getElementById('unauthorized').style.display = 'none';
        loadStats();
    }

    function switchTab(name) {
        document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
        if (name === 'records') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('tab-records').classList.add('active');
            loadRecords(1);
        } else if (name === 'batch') {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('tab-batch').classList.add('active');
        } else if (name === 'stats') {
            document.querySelectorAll('.tab')[2].classList.add('active');
            document.getElementById('tab-stats').classList.add('active');
            loadStats();
        }
    }

    function showToast(msg, type) {
        var t = document.getElementById('toast');
        t.textContent = msg;
        t.className = 'toast ' + (type || 'info') + ' show';
        setTimeout(function() { t.classList.remove('show'); }, 3000);
    }

    // ========== Tab1：记录管理 ==========
    var allRecords = [];
    var currentPage = 1;
    var pageSize = 20;

    function loadRecords(page) {
        currentPage = page || 1;
        var params = '?token=' + encodeURIComponent(TOKEN);
        var route = document.getElementById('filterRoute').value;
        var month = document.getElementById('filterMonth').value;
        var teller = document.getElementById('filterTeller').value.trim();
        if (route) params += '&route=' + encodeURIComponent(route);
        if (month) params += '&month=' + encodeURIComponent(month);
        if (teller) params += '&tellerNumber=' + encodeURIComponent(teller);

        fetch(API_BASE + '/api/admin-query' + params)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { showToast(data.error, 'error'); return; }
                allRecords = data.records || [];
                renderRecords();
                renderPagination(data.total || 0, data.page || 1, data.pageSize || 20);
            })
            .catch(function(err) { showToast('查询失败：' + err.message, 'error'); });
    }

    function renderRecords() {
        var tbody = document.getElementById('recordsBody');
        var empty = document.getElementById('emptyRecords');
        if (allRecords.length === 0) {
            tbody.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        tbody.innerHTML = allRecords.map(function(r) {
            var f = r.fields;
            return '<tr>' +
                '<td><input type="checkbox" class="checkbox" data-id="' + r.id + '"></td>' +
                '<td>' + (f['柜员号'] || '') + '</td>' +
                '<td>' + (f['姓名'] || '') + '</td>' +
                '<td>' + (f['ygxs'] || '') + '</td>' +
                '<td>' + (f['旅行线路'] || '') + '</td>' +
                '<td>' + (f['月份'] || '') + '</td>' +
                '<td>' + (f['家庭成员人数'] || '0') + '人</td>' +
                '<td class="' + (f['是否允许修改'] === '否' ? 'badge-no' : 'badge-yes') + '">' + (f['是否允许修改'] || '是') + '</td>' +
                '<td><button class="btn btn-outline btn-sm" onclick="toggleAllow(\'' + r.id + '\',\'' + (f['是否允许修改'] === '否' ? '是' : '否') + '\')">' + (f['是否允许修改'] === '否' ? '允许' : '禁止') + '</button></td>' +
            '</tr>';
        }).join('');
    }

    function renderPagination(total, page, size) {
        var totalPages = Math.ceil(total / size);
        var wrap = document.getElementById('pagination');
        if (totalPages <= 1) { wrap.innerHTML = ''; return; }
        var html = '';
        for (var i = 1; i <= totalPages; i++) {
            html += '<button class="' + (i === page ? 'active' : '') + '" onclick="loadRecords(' + i + ')">' + i + '</button>';
        }
        wrap.innerHTML = html;
    }

    function toggleSelectAll() {
        var checked = document.getElementById('selectAll').checked;
        document.querySelectorAll('#recordsBody .checkbox').forEach(function(cb) { cb.checked = checked; });
    }

    function getSelectedIds() {
        var ids = [];
        document.querySelectorAll('#recordsBody .checkbox:checked').forEach(function(cb) { ids.push(cb.getAttribute('data-id')); });
        return ids;
    }

    function toggleAllow(recordId, newValue) {
        fetch(API_BASE + '/api/admin-update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: TOKEN, recordIds: [recordId], allowEdit: newValue })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { showToast(data.error, 'error'); return; }
            showToast('修改成功', 'success');
            loadRecords(currentPage);
        })
        .catch(function(err) { showToast('修改失败：' + err.message, 'error'); });
    }

    function batchUpdate(allowEdit) {
        var ids = getSelectedIds();
        if (ids.length === 0) { showToast('请先选择记录', 'error'); return; }
        if (!confirm('确认将选中的 ' + ids.length + ' 条记录设为"' + (allowEdit === '是' ? '允许修改' : '禁止修改') + '"？')) return;
        fetch(API_BASE + '/api/admin-update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: TOKEN, recordIds: ids, allowEdit: allowEdit })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { showToast(data.error, 'error'); return; }
            showToast('已更新 ' + data.updatedCount + ' 条记录', 'success');
            loadRecords(currentPage);
        })
        .catch(function(err) { showToast('批量修改失败：' + err.message, 'error'); });
    }

    // CSV 导出
    document.getElementById('exportBtn').addEventListener('click', function(e) {
        var route = document.getElementById('filterRoute').value;
        var month = document.getElementById('filterMonth').value;
        var params = '?token=' + encodeURIComponent(TOKEN);
        if (route) params += '&route=' + encodeURIComponent(route);
        if (month) params += '&month=' + encodeURIComponent(month);
        this.href = API_BASE + '/api/admin-export' + params;
    });

    // ========== Tab2：批量设置 ==========
    var batchMatchedIds = [];

    function previewBatch() {
        var allowEdit = document.querySelector('input[name="batchAllow"]:checked').value;
        var filters = {};
        var route = document.getElementById('batchRoute').value;
        var month = document.getElementById('batchMonth').value;
        var start = document.getElementById('batchTellerStart').value.trim();
        var end = document.getElementById('batchTellerEnd').value.trim();
        if (route) filters.route = route;
        if (month) filters.month = month;
        if (start) filters.tellerNumberStart = start;
        if (end) filters.tellerNumberEnd = end;

        if (Object.keys(filters).length === 0) {
            showToast('请至少填写一个筛选条件', 'error'); return;
        }

        // 先查询匹配的记录数
        var queryParams = '?token=' + encodeURIComponent(TOKEN);
        if (route) queryParams += '&route=' + encodeURIComponent(route);
        if (month) queryParams += '&month=' + encodeURIComponent(month);

        fetch(API_BASE + '/api/admin-query' + queryParams)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { showToast(data.error, 'error'); return; }
                var records = data.records || [];
                // 前端再过滤柜员号范围
                if (start || end) {
                    var s = parseInt(start) || 0;
                    var e = parseInt(end) || 9999999;
                    records = records.filter(function(r) {
                        var num = parseInt(r.fields['柜员号']) || 0;
                        return num >= s && num <= e;
                    });
                }
                batchMatchedIds = records.map(function(r) { return r.id; });
                var box = document.getElementById('previewBox');
                box.style.display = 'block';
                box.innerHTML = '📊 符合条件的记录：<span class="count">' + records.length + '</span> 条<br><br>' +
                    (records.length > 0 ? records.slice(0, 5).map(function(r) { return r.fields['柜员号'] + ' ' + (r.fields['姓名'] || ''); }).join('<br>') + (records.length > 5 ? '<br>...' : '') : '暂无匹配记录');
                document.getElementById('confirmBatchBtn').style.display = records.length > 0 ? 'inline-block' : 'none';
            })
            .catch(function(err) { showToast('预览失败：' + err.message, 'error'); });
    }

    function confirmBatch() {
        var allowEdit = document.querySelector('input[name="batchAllow"]:checked').value;
        if (!confirm('确认将 ' + batchMatchedIds.length + ' 条记录设为"' + (allowEdit === '是' ? '允许修改' : '禁止修改') + '"？此操作不可撤销！')) return;

        fetch(API_BASE + '/api/admin-batch-update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: TOKEN,
                allowEdit: allowEdit,
                filters: {
                    route: document.getElementById('batchRoute').value || undefined,
                    month: document.getElementById('batchMonth').value || undefined,
                    tellerNumberStart: document.getElementById('batchTellerStart').value.trim() || undefined,
                    tellerNumberEnd: document.getElementById('batchTellerEnd').value.trim() || undefined
                }
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.error) { showToast(data.error, 'error'); return; }
            showToast('已更新 ' + data.updatedCount + ' 条记录', 'success');
            document.getElementById('previewBox').style.display = 'none';
            document.getElementById('confirmBatchBtn').style.display = 'none';
            batchMatchedIds = [];
        })
        .catch(function(err) { showToast('批量设置失败：' + err.message, 'error'); });
    }

    // ========== Tab3：统计看板 ==========
    function loadStats() {
        fetch(API_BASE + '/api/admin-stats?token=' + encodeURIComponent(TOKEN))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) { showToast(data.error, 'error'); return; }
                renderStatsCards(data);
                renderCrossTable(data);
            })
            .catch(function(err) { showToast('加载统计失败：' + err.message, 'error'); });
    }

    function renderStatsCards(data) {
        var html = '';
        // 总人数
        html += '<div class="stats-card"><div class="icon">👥</div><div class="num">' + data.total + '</div><div class="label">总报名人数</div></div>';
        // 各线路：按固定顺序排序
        var routeOrder = ['江西庐山', '福建厦门', '上海', '泰顺', '宁海', '台州'];
        var routes = Object.keys(data.routeCount || {}).sort(function(a, b) {
            var ia = routeOrder.findIndex(function(k) { return a.indexOf(k) !== -1; });
            var ib = routeOrder.findIndex(function(k) { return b.indexOf(k) !== -1; });
            return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        });
        routes.slice(0, 3).forEach(function(r) {
            html += '<div class="stats-card route"><div class="icon">🚌</div><div class="num">' + data.routeCount[r] + '</div><div class="label">' + r + '</div></div>';
        });
        // 修改权限
        html += '<div class="stats-card allow"><div class="icon">✅</div><div class="num">' + data.allowEditCount + '</div><div class="label">允许修改</div></div>';
        html += '<div class="stats-card deny"><div class="icon">⛔</div><div class="num">' + data.notAllowEditCount + '</div><div class="label">禁止修改</div></div>';
        document.getElementById('statsCards').innerHTML = html;
    }

    function renderCrossTable(data) {
        // 线路按序号排序：1.江西庐山 2.福建厦门 3.上海 4.泰顺 5.宁海 6.台州
        var routeOrder = ['江西庐山', '福建厦门', '上海', '泰顺', '宁海', '台州'];
        var routes = (Object.keys(data.crossTable || {})).sort(function(a, b) {
            var ia = routeOrder.findIndex(function(k) { return a.indexOf(k) !== -1; });
            var ib = routeOrder.findIndex(function(k) { return b.indexOf(k) !== -1; });
            return (ia === -1 ? 99 : ia) - (ib === -1 ? 99 : ib);
        });
        var months = {};
        routes.forEach(function(r) {
            Object.keys(data.crossTable[r] || {}).forEach(function(m) { months[m] = true; });
        });
        var monthList = Object.keys(months).sort();

        if (routes.length === 0 || monthList.length === 0) {
            document.getElementById('crossTableWrap').innerHTML = '<div class="empty">暂无数据</div>';
            return;
        }

        var html = '<table class="cross-table"><thead><tr><th style="text-align:left;padding-left:14px;">线路 ＼ 月份</th>';
        monthList.forEach(function(m) { html += '<th>' + m + '</th>'; });
        html += '<th class="total-col">合计</th></tr></thead><tbody>';

        var colTotals = {};
        monthList.forEach(function(m) { colTotals[m] = 0; });
        var grandTotal = 0;

        routes.forEach(function(r) {
            html += '<tr><td class="row-header">' + r + '</td>';
            var rowTotal = 0;
            monthList.forEach(function(m) {
                var c = (data.crossTable[r] && data.crossTable[r][m]) || 0;
                html += '<td class="' + (c === 0 ? 'zero' : '') + '">' + c + '人</td>';
                rowTotal += c;
                colTotals[m] += c;
            });
            html += '<td class="total-col">' + rowTotal + '人</td></tr>';
            grandTotal += rowTotal;
        });

        // 合计行
        html += '<tr class="total-row"><td class="row-header">合计</td>';
        monthList.forEach(function(m) {
            html += '<td>' + colTotals[m] + '人</td>';
        });
        html += '<td class="total-col">' + grandTotal + '人</td></tr>';

        html += '</tbody></table>';
        document.getElementById('crossTableWrap').innerHTML = html;
    }
</script>
</body>
</html>
