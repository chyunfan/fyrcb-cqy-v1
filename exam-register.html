<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026е№ҙеҸҚеҒҮеёҒиҖғиҜ•жҠҘеҗҚ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .name-display {
      padding: 12px 16px;
      background: #f5f5f5;
      border-radius: 8px;
      color: #333;
      font-size: 16px;
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .session-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .session-col h4 {
      text-align: center;
      color: #667eea;
      font-size: 16px;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e8e8f0;
    }

    .session-col .session-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .session-option {
      position: relative;
    }

    .session-option input[type="radio"] {
      display: none;
    }

    .session-option label {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 0;
    }

    /* иҮӘе®ҡд№үеҚ•йҖүеңҶзӮ?*/
    .session-option label::before {
      content: '';
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      border: 2px solid #ccc;
      border-radius: 50%;
      margin-top: 2px;
      transition: all 0.2s;
      background: #fff;
    }

    .session-option input[type="radio"]:checked + label::before {
      border-color: #667eea;
      background: #667eea;
      box-shadow: inset 0 0 0 4px #fff;
    }

    .session-option input[type="radio"]:checked + label {
      border-color: #667eea;
      background: linear-gradient(135deg, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
      color: #667eea;
      font-weight: 600;
    }

    .session-option label:hover {
      border-color: #667eea;
    }

    .session-date {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .session-time {
      font-size: 14px;
      color: #666;
    }

    .session-option input[type="radio"]:checked + label .session-time {
      color: #667eea;
    }

    .session-full {
      color: #f44336;
      font-size: 12px;
      margin-left: 8px;
    }

    .session-option.disabled label {
      background: #f5f5f5;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .session-option.disabled label::before {
      border-color: #f44336;
      background: #ffebee;
    }

    .full-badge {
      background: #f44336;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      margin-left: auto;
      align-self: center;
    }

    button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      display: none;
    }

    .message.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }

    .message.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }

    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
      gap: 10px;
    }

    .step-dot {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-weight: 600;
      font-size: 14px;
    }

    .step-dot.active {
      background: #667eea;
      color: white;
    }

    .step-dot.completed {
      background: #4caf50;
      color: white;
    }

    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .info-row .form-group {
      margin-bottom: 0;
    }

    .info-box {
      background: #e3f2fd;
      border-left: 4px solid #2196f3;
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 20px;
      font-size: 14px;
      color: #1976d2;
    }

    .capacity-bar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      margin-top: 8px;
      overflow: hidden;
    }

    .capacity-fill {
      height: 100%;
      background: #4caf50;
      transition: width 0.3s;
    }

    .capacity-fill.warning {
      background: #ff9800;
    }

    .capacity-fill.full {
      background: #f44336;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>2026е№ҙеҸҚеҒҮеёҒиҖғиҜ•жҠҘеҗҚ</h1>
    <div class="subtitle">иҜ·дҪҝз”Ёжҹңе‘ҳеҸ·зҷ»еҪ•</div>

    <div class="step-indicator">
      <div class="step-dot active" id="dot1">1</div>
      <div class="step-dot" id="dot2">2</div>
    </div>

    <!-- жӯҘйӘӨ1пјҡиҫ“е…Ҙжҹңе‘ҳеҸ· -->
    <div class="step active" id="step1">
      <div class="form-group">
        <label for="tellerId">жҹңе‘ҳеҸ?/label>
        <input type="text" id="tellerId" placeholder="иҜ·иҫ“е…ҘжӮЁзҡ„жҹңе‘ҳеҸ·" autocomplete="off">
      </div>
      <button onclick="verifyTeller()">дёӢдёҖжӯ?/button>
    </div>

    <!-- жӯҘйӘӨ2пјҡеЎ«еҶҷжҠҘеҗҚдҝЎжҒ?-->
    <div class="step" id="step2">
      <div id="alreadyRegistered" style="display:none;">
        <div class="info-box">
          вҡ пёҸ жӮЁе·ІжҠҘеҗҚпјҢж— йңҖйҮҚеӨҚжҠҘеҗҚ<br>
          жҠҘеҗҚеңәж¬Ўпј?strong id="registeredSession"></strong><br>
          жҠҘеҗҚж—¶й—ҙпј?span id="registeredTime"></span>
        </div>
      </div>

      <div class="info-row">
        <div class="form-group">
          <label>жҹңе‘ҳеҸ?/label>
          <div class="name-display" id="displayTellerId"></div>
        </div>
        <div class="form-group">
          <label>е§“еҗҚ</label>
          <div class="name-display" id="displayName"></div>
        </div>
      </div>

      <div class="form-group">
        <label>йҖүжӢ©иҖғиҜ•еңәж¬Ў</label>
        <div class="session-columns">
          <div class="session-col" id="col0625">
            <h4>6жң?5ж—?/h4>
            <div class="session-list" id="list0625"></div>
          </div>
          <div class="session-col" id="col0626">
            <h4>6жң?6ж—?/h4>
            <div class="session-list" id="list0626"></div>
          </div>
        </div>
      </div>

      <button onclick="submitRegistration()">жҸҗдәӨжҠҘеҗҚ</button>
      <button onclick="goBack()" style="background: #999; margin-top: 10px;">иҝ”еӣһдҝ®ж”№</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const API_BASE = '/api/exam-api';
    
    let currentTellerId = '';
    let currentName = '';
    let sessionStats = {};
    let deadline = '2026-06-15'; // й»ҳи®ӨжҲӘжӯўж—Ҙжңҹ
    let isAfterDeadline = false; // жҳҜеҗҰи¶…иҝҮжҲӘжӯўж—Ҙжңҹ

    // еңәж¬Ўе®ҡд№ү
    const SESSIONS = [
      { id: 'session1', value: '6жң?5ж—Ҙз¬¬1ең?15:40ејҖе§?, date: '6жң?5ж—?, time: '15:40 ејҖе§? },
      { id: 'session2', value: '6жң?5ж—Ҙз¬¬2ең?18:20ејҖе§?, date: '6жң?5ж—?, time: '18:20 ејҖе§? },
      { id: 'session3', value: '6жң?5ж—Ҙз¬¬3ең?19:40ејҖе§?, date: '6жң?5ж—?, time: '19:40 ејҖе§? },
      { id: 'session4', value: '6жң?6ж—Ҙз¬¬1ең?15:40ејҖе§?, date: '6жң?6ж—?, time: '15:40 ејҖе§? },
      { id: 'session5', value: '6жң?6ж—Ҙз¬¬2ең?18:20ејҖе§?, date: '6жң?6ж—?, time: '18:20 ејҖе§? },
      { id: 'session6', value: '6жң?6ж—Ҙз¬¬3ең?19:40ејҖе§?, date: '6жң?6ж—?, time: '19:40 ејҖе§? }
    ];

    // йЎөйқўеҠ иҪҪж—¶иҺ·еҸ–жҲӘжӯўж—Ҙжң?    (async function() {
      try {
        const r = await fetch(`${API_BASE}?action=get-deadline`);
        const d = await r.json();
        deadline = d.deadline || '2026-06-15';
        const today = new Date().toISOString().split('T')[0];
        isAfterDeadline = today > deadline;
      } catch(e) {
        console.error('еҠ иҪҪжҲӘжӯўж—ҘжңҹеӨұиҙҘ', e);
      }
    })();

    // йӘҢиҜҒжҹңе‘ҳеҸ?    async function verifyTeller() {
      const tellerId = document.getElementById('tellerId').value.trim();
      
      if (!tellerId) {
        showMessage('иҜ·иҫ“е…Ҙжҹңе‘ҳеҸ·', 'error');
        return;
      }

      const btn = event.target;
      btn.innerHTML = '<div class="loading"></div>';
      btn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}?action=lookup&tellerId=${tellerId}`);
        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'йӘҢиҜҒеӨұиҙҘ');
        }

        currentTellerId = tellerId;
        currentName = data.name;

        // жҳҫзӨәз¬¬дәҢжӯ?        document.getElementById('displayTellerId').textContent = tellerId;
        document.getElementById('displayName').textContent = data.name;

        // еҰӮжһңе·ІжҠҘеҗҚпјҢжҳҫзӨәжҠҘеҗҚдҝЎжҒҜ
        if (data.alreadyRegistered) {
          document.getElementById('alreadyRegistered').style.display = 'block';
          document.getElementById('registeredSession').textContent = data.registration.session;
          document.getElementById('registeredTime').textContent = new Date(data.registration.registeredAt).toLocaleString('zh-CN');
          
          // еҰӮжһңи¶…иҝҮжҲӘжӯўж—ҘжңҹпјҢеҸӘиғҪжҹҘзңӢдёҚиғҪдҝ®ж”?          if (isAfterDeadline) {
            showMessage(`вҡ пёҸ жҠҘеҗҚе·ІжҲӘжӯўпјҲжҲӘжӯўж—Ҙжңҹпј?{deadline}пјүпјҢжӮЁе·ІжҠҘеҗҚиҜҘеңәж¬ЎпјҢж— жі•дҝ®ж”№гҖӮ`, 'error');
            document.querySelector('button[onclick="submitRegistration()"]').style.display = 'none';
            document.querySelector('button[onclick="goBack()"]').textContent = 'иҝ”еӣһ';
          }
        } else {
          // жңӘжҠҘеҗҚпјҢжЈҖжҹҘжҳҜеҗҰи¶…иҝҮжҲӘжӯўж—Ҙжң?          if (isAfterDeadline) {
            showMessage(`вҡ пёҸ жҠҘеҗҚе·ІжҲӘжӯўпјҲжҲӘжӯўж—Ҙжңҹпј?{deadline}пјүпјҢж— жі•жҠҘеҗҚгҖӮ`, 'error');
            return;
          }
        }

        // еҠ иҪҪеңәж¬ЎдҝЎжҒҜпјҲд»Һ lookup е“Қеә”дёӯиҺ·еҸ–пјү
        sessionStats = data.sessionStats || {};
        renderSessions();

        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
        document.getElementById('dot1').classList.remove('active');
        document.getElementById('dot1').classList.add('completed');
        document.getElementById('dot2').classList.add('active');

      } catch (error) {
        showMessage(error.message, 'error');
      } finally {
        btn.innerHTML = 'дёӢдёҖжӯ?;
        btn.disabled = false;
      }
    }

    // жёІжҹ“еңәж¬ЎйҖүйЎ№пјҲдёӨеҲ—пјҡ6/25 е·ҰпјҢ6/26 еҸіпјү
    function renderSessions() {
      const list0625 = document.getElementById('list0625');
      const list0626 = document.getElementById('list0626');
      list0625.innerHTML = '';
      list0626.innerHTML = '';

      SESSIONS.forEach(session => {
        const raw = sessionStats[session.value];
        const count = typeof raw === 'number' ? raw : (raw?.count || 0);
        const isFull = count >= 30;
        const percentage = (count / 30) * 100;
        const is0625 = session.date === '6жң?5ж—?;
        const target = is0625 ? list0625 : list0626;

        const div = document.createElement('div');
        div.className = `session-option ${isFull ? 'disabled' : ''}`;
        div.innerHTML = `
          <input type="radio" id="${session.id}" name="session" value="${session.value}" ${isFull ? 'disabled' : ''}>
          <label for="${session.id}">
            <div>
              <div class="session-date">${session.value}</div>
              <div style="font-size: 12px; color: #999; margin-top: 4px;">
                е·ІжҠҘеҗҚпјҡ${count}/30дә?              </div>
              <div class="capacity-bar">
                <div class="capacity-fill ${percentage >= 90 ? 'full' : percentage >= 70 ? 'warning' : ''}" 
                     style="width: ${percentage}%"></div>
              </div>
            </div>
            ${isFull ? '<span class="full-badge">е·Іж»Ў</span>' : ''}
          </label>
        `;
        target.appendChild(div);
      });
    }

    // жҸҗдәӨжҠҘеҗҚ
    async function submitRegistration() {
      // жЈҖжҹҘжҳҜеҗҰи¶…иҝҮжҲӘжӯўж—Ҙжң?      if (isAfterDeadline) {
        showMessage(`вҡ пёҸ жҠҘеҗҚе·ІжҲӘжӯўпјҲжҲӘжӯўж—Ҙжңҹпј?{deadline}пјүпјҢж— жі•жҸҗдәӨгҖӮ`, 'error');
        return;
      }

      const session = document.querySelector('input[name="session"]:checked');
      
      if (!session) {
        showMessage('иҜ·йҖүжӢ©иҖғиҜ•еңәж¬Ў', 'error');
        return;
      }

      const btn = event.target;
      btn.innerHTML = '<div class="loading"></div>';
      btn.disabled = true;

      try {
        const response = await fetch(`${API_BASE}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'register',
            tellerId: currentTellerId,
            session: session.value
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'жҸҗдәӨеӨұиҙҘ');
        }

        // жҠҘеҗҚжҲҗеҠҹеҗҺеҲ·ж–°еңәж¬Ўз»ҹи®?        try {
          const r = await fetch(`${API_BASE}?action=lookup&tellerId=${currentTellerId}`);
          const d = await r.json();
          if (d.sessionStats) sessionStats = d.sessionStats;
        } catch(e) { console.error('еҲ·ж–°з»ҹи®ЎеӨұиҙҘ', e); }

        showMessage(`жҠҘеҗҚжҲҗеҠҹпј?br>жҹңе‘ҳеҸ·пјҡ${currentTellerId}<br>е§“еҗҚпј?{currentName}<br>еңәж¬Ўпј?{session.value}`, 'success');

        // 3з§’еҗҺйҮҚзҪ®иЎЁеҚ•
        setTimeout(() => {
          resetForm();
        }, 3000);

      } catch (error) {
        showMessage(error.message, 'error');
      } finally {
        btn.innerHTML = 'жҸҗдәӨжҠҘеҗҚ';
        btn.disabled = false;
      }
    }

    // иҝ”еӣһдёҠдёҖжӯ?    function goBack() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot1').classList.remove('completed');
      document.getElementById('dot1').classList.add('active');
    }

    // йҮҚзҪ®иЎЁеҚ•
    function resetForm() {
      document.getElementById('step2').classList.remove('active');
      document.getElementById('step1').classList.add('active');
      document.getElementById('dot2').classList.remove('active');
      document.getElementById('dot1').classList.remove('completed');
      document.getElementById('dot1').classList.add('active');
      document.getElementById('tellerId').value = '';
      document.querySelectorAll('input[name="session"]').forEach(r => r.checked = false);
      document.getElementById('message').className = 'message';
      document.getElementById('alreadyRegistered').style.display = 'none';
      currentTellerId = '';
      currentName = '';
    }

    // жҳҫзӨәж¶ҲжҒҜ
    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.innerHTML = text;
      msg.className = `message ${type}`;
    }

    // еӣһиҪҰй”®жҸҗдә?    document.getElementById('tellerId').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        verifyTeller();
      }
    });
  </script>
</body>
</html>
